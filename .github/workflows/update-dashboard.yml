name: Update Morning Dashboard

on:
  schedule:
    # JST 5:00 (UTC 20:00 前日) 米国市場引け後・東京寄り付き前に実行
    - cron: "0 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync latest before fetching
        run: git pull --ff-only origin main

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data
        run: python fetch_data.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update market dashboard data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase -X theirs --autostash origin main
          git push
